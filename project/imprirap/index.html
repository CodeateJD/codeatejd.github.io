<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImpriRap — Previews</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #111; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
  h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  p { color: rgba(255,255,255,0.4); margin-bottom: 32px; font-size: 14px; }
  .cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  a.card {
    display: block;
    background: #1e1e1e;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 32px 28px;
    text-decoration: none;
    color: white;
    width: 220px;
    text-align: center;
    transition: transform 0.2s, border-color 0.3s;
  }
  a.card:hover { transform: translateY(-4px); border-color: #c90087; }
  .card .letter { font-size: 40px; font-weight: 900; margin-bottom: 12px; }
  .card .name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .card .desc { font-size: 12px; color: rgba(255,255,255,0.4); }
  .a .letter { color: #61abeb; }
  .b .letter { background: linear-gradient(135deg, #c90087, #61abeb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .c .letter { color: #c90087; }
</style>
</head>
<body>
  <h1>ImpriRap — Previews</h1>
  <p>Selecciona una opcion para ver el diseño</p>
  <div class="cards">
    <a href="preview_A.html" class="card a">
      <div class="letter">A</div>
      <div class="name">Clean & Modern</div>
      <div class="desc">Fondo blanco, minimalista</div>
    </a>
    <a href="preview_B.html" class="card b">
      <div class="letter">B</div>
      <div class="name">Bold & Dark</div>
      <div class="desc">Fondo oscuro, gradientes</div>
    </a>
    <a href="preview_C.html" class="card c">
      <div class="letter">C</div>
      <div class="name">CMYK Vibrante</div>
      <div class="desc">Hero split, colorido</div>
    </a>
  </div>
</body>
</html>
