<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 56" width="260" height="56">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5576c"/>
      <stop offset="100%" stop-color="#667eea"/>
    </linearGradient>
  </defs>
  <!-- Background pill -->
  <rect width="260" height="56" rx="12" fill="url(#bg)" opacity="0.92"/>
  <!-- Accent line bottom -->
  <rect x="12" y="50" width="236" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>
  <!-- > symbol -->
  <text x="16" y="38" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="26" font-weight="800" fill="#4ade80">></text>
  <!-- codeate text -->
  <text x="38" y="38" font-family="'Inter', 'Arial', sans-serif" font-size="24" font-weight="600" fill="#f5576c" letter-spacing="0.3">codeate</text>
  <!-- JD text -->
  <text x="178" y="38" font-family="'Inter', 'Arial', sans-serif" font-size="26" font-weight="900" fill="#ffffff" letter-spacing="1">JD</text>
</svg>