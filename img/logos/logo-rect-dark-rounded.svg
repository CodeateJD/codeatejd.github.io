<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5576c"/>
      <stop offset="100%" stop-color="#667eea"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="600" height="200" rx="24"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Fondo negro rectangulo redondeado -->
    <rect width="600" height="200" rx="24" fill="#0a0a0a"/>
    <!-- Linea accent abajo -->
    <rect x="24" y="186" width="552" height="3" rx="1.5" fill="url(#accent)" opacity="0.7"/>
    <!-- >codeate JD en linea -->
    <text x="300" y="128" text-anchor="middle" font-family="'Inter', 'Arial', sans-serif" font-size="72" font-weight="800" letter-spacing="1"><tspan fill="#4ade80">&gt;</tspan><tspan fill="#f5576c">codeate</tspan><tspan fill="#ffffff"> JD</tspan></text>
  </g>
</svg>