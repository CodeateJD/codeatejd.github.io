<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="bluebg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f1b2d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5576c"/>
      <stop offset="100%" stop-color="#667eea"/>
    </linearGradient>
  </defs>
  <!-- Fondo azul terminal rectangulo -->
  <rect width="600" height="200" fill="url(#bluebg)"/>
  <!-- Barra terminal -->
  <rect width="600" height="32" fill="#0d1520"/>
  <circle cx="22" cy="16" r="5.5" fill="#f5576c" opacity="0.9"/>
  <circle cx="40" cy="16" r="5.5" fill="#fbbf24" opacity="0.9"/>
  <circle cx="58" cy="16" r="5.5" fill="#4ade80" opacity="0.9"/>
  <!-- Linea accent abajo -->
  <rect x="24" y="186" width="552" height="3" rx="1.5" fill="url(#accent)" opacity="0.7"/>
  <!-- >codeate JD en linea -->
  <text x="300" y="136" text-anchor="middle" font-family="'Inter', 'Arial', sans-serif" font-size="72" font-weight="800" letter-spacing="1"><tspan fill="#4ade80">&gt;</tspan><tspan fill="#f5576c">codeate</tspan><tspan fill="#ffffff"> JD</tspan></text>
</svg>